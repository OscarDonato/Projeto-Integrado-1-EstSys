<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ced4da; /* Fundo cinza mais escuro */
            margin: 0;
            padding: 40px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background-color: #e9ecef; /* Container cinza claro */
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .back-link:hover { text-decoration: underline; }
        h1 { margin-top: 0; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td { border: 1px solid #adb5bd; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #dee2e6; }
        .btn {
            padding: 8px 12px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .btn-add { background-color: #28a745; margin-bottom: 15px; }
        .btn-edit { background-color: #ffc107; color: #333; margin-right: 5px;}
        .btn-delete { background-color: #dc3545; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('configuracoes') }}" class="back-link">&larr; Voltar para Configurações</a>
        <h1>Cadastro de Usuários</h1>
        <p>Gerenciamento dos usuários do sistema e suas permissões associadas.</p>

        <a href="#" class="btn btn-add">+ Novo Usuário</a>
        <form method="POST" action="/add_usuario" style="margin-bottom: 20px;">
            <input type="text" name="usr_codigo" placeholder="ID" required style="padding: 8px; margin-right: 5px; width: 60px;">
            <input type="text" name="usr_nome" placeholder="Nome" required style="padding: 8px; margin-right: 5px;">
            <input type="email" name="usr_email" placeholder="E-mail" required style="padding: 8px; margin-right: 5px;">
            <input type="text" name="usr_telefone" placeholder="Telefone" required style="padding: 8px; margin-right: 5px; width: 120px;">
            <input type="text" name="usr_grupo" placeholder="Cód. Grupo" required style="padding: 8px; margin-right: 5px; width: 80px;">
            <input type="password" name="usr_senha" placeholder="Senha" required style="padding: 8px; margin-right: 5px; width: 100px;">
            <button type="submit" class="btn btn-add" style="margin-bottom: 0;">Adicionar Usuário</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>Grupo</th>
                    <th>Senha</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>{{ row[4] }}</td>
                    <td>{{ row[5] }}</td>
                    <td>
                        <button class="btn btn-edit">Alterar</button>
                        <form method="POST" action="/dlt_usuario" style="display:inline;">
                            <input type="hidden" name="codigo" value="{{ row[0] }}">
                            <button type="submit" class="btn btn-delete">X</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupos de Acesso</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ced4da; /* Fundo cinza mais escuro */
            margin: 0;
            padding: 40px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background-color: #e9ecef; /* Container cinza claro */
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .back-link:hover { text-decoration: underline; }
        h1 { margin-top: 0; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td { border: 1px solid #adb5bd; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #dee2e6; }
        .btn {
            padding: 8px 12px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .btn-add { background-color: #28a745; margin-bottom: 15px; }
        .btn-edit { background-color: #ffc107; color: #333; margin-right: 5px;}
        .btn-delete { background-color: #dc3545; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('configuracoes') }}" class="back-link">&larr; Voltar para Configurações</a>
        <h1>Grupos de Acesso</h1>
        <p>Gerenciamento dos grupos e permissões.</p>

        <a href="#" class="btn btn-add">+ Novo Grupo</a>
        <form method="POST" action="/add_grupo" style="margin-bottom: 20px;">
            <input type="text" name="grp_codigo" placeholder="Cód. Grupo" required style="padding: 8px; margin-right: 5px; width: 90px;">
            <input type="text" name="grp_descricao" placeholder="Descrição" required style="padding: 8px; margin-right: 5px;">
            <select name="grp_tipoacesso" required style="padding: 8px; margin-right: 5px;">
                <option value="" disabled selected>Tipo de Acesso</option>
                <option value="1">1 - Apenas visualiza tudo</option>
                <option value="2">2 - Pode alterar cadastros</option>
                <option value="3">3 - acesso a tudo</option>
            </select>
            <button type="submit" class="btn btn-add" style="margin-bottom: 0;">Adicionar Grupo</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Cód. Grupo</th>
                    <th>Descrição</th>
                    <th>Tipo de Acesso</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>
                        <button class="btn btn-edit">Alterar</button>
                        <form method="POST" action="/dlt_grupo" style="display:inline;">
                            <input type="hidden" name="codigo" value="{{ row[0] }}">
                            <button type="submit" class="btn btn-delete">X</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

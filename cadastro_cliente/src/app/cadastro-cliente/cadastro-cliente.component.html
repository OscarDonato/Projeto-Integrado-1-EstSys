<div class="container">
  <h2>Cadastro de Cliente</h2>

  <form #cadastroForm="ngForm" (ngSubmit)="onSubmit(cadastroForm)">
    <div class="form-group">
      <label for="nome">Nome</label>
      <input
        type="text"
        id="nome"
        name="nome"
        class="form-control"
        [(ngModel)]="cliente.nome"
        required
        #nome="ngModel"
      />
      <div *ngIf="nome.invalid && nome.touched" class="text-danger">
        O nome é obrigatório.
      </div>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        [(ngModel)]="cliente.email"
        required
        #email="ngModel"
      />
      <div *ngIf="email.invalid && email.touched" class="text-danger">
        O e-mail é obrigatório e deve ser válido.
      </div>
    </div>

    <div class="form-group">
      <label for="telefone">Telefone</label>
      <input
        type="text"
        id="telefone"
        name="telefone"
        class="form-control"
        [(ngModel)]="cliente.telefone"
        required
        #telefone="ngModel"
      />
      <div *ngIf="telefone.invalid && telefone.touched" class="text-danger">
        O telefone é obrigatório.
      </div>
    </div>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="cadastroForm.invalid"
    >
      Cadastrar
    </button>
  </form>
</div>
